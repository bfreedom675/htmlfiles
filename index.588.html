<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🌸 BookFlow v7 — formatted</title>

<style>
:root{
    --pink:#ff5fa2;
    --purple:#7b5cff;
    --bg1:#ffe6f3;
    --bg2:#efe6ff;
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',Arial;
    display:flex;
    height:100vh;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* SIDEBAR */
#sidebar{
    width:300px;
    padding:20px;
    background:#f3e8ff;
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow:auto;
}

input,button,textarea,select{
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    background:linear-gradient(90deg,var(--pink),var(--purple));
    color:white;
    cursor:pointer;
}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;}

#chat{
    flex:1;
    padding:20px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#ffe6f3;
}

.msg{
    padding:12px;
    border-radius:12px;
    max-width:70%;
    position:relative;
    background:#ffd6eb;
}

.note-remarks{
    margin-top:8px;
    padding:8px;
    background:#ffe0f0;
    border-radius:8px;
}

.remark-item{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}

.toolbar{
    display:flex;
    gap:5px;
    padding:10px;
    background:#f3e8ff;
}

.toolbar button{
    padding:5px 8px;
    font-size:12px;
}

#textEditor{
    min-height:80px;
    padding:10px;
    background:white;
    border-radius:10px;
    outline:none;
}

.msg:hover .edit,.msg:hover .del{
    opacity:1;
}

.edit,.del{
    position:absolute;
    top:5px;
    opacity:0;
    cursor:pointer;
}

.edit{right:25px;}
.del{right:5px;}

</style>
</head>

<body>

<div id="sidebar">
<h2>🌸 BookFlow</h2>

<input id="newBook" placeholder="Нова книга">
<button onclick="addBook()">➕ Додати</button>
<div id="bookList"></div>
</div>

<div id="main">
<header id="title">📚 Оберіть книгу</header>
<div id="chat"></div>

<!-- TOOLBAR -->
<div class="toolbar">
<button onclick="format('bold')"><b>B</b></button>
<button onclick="format('italic')"><i>I</i></button>

<select onchange="setFont(this.value)">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Courier New">Courier</option>
</select>

<select onchange="setSize(this.value)">
<option value="14px">14</option>
<option value="18px">18</option>
<option value="24px">24</option>
</select>
</div>

<div id="textEditor" contenteditable="true"></div>

<textarea id="newRemark" placeholder="Нова примітка"></textarea>
<button onclick="addRemarkTemp()">➕ Додати примітку</button>

<div id="remarkPreview"></div>

<button onclick="addNote()">➤ Зберегти нотатку</button>

</div>

<script>

let db = JSON.parse(localStorage.getItem("bookflow_v7")) || {books:{}};
let current=null;
let editIndex=null;
let tempRemarks=[];

/* SAVE */
function save(){
localStorage.setItem("bookflow_v7",JSON.stringify(db));
}

/* BOOKS */
function addBook(){
let name=document.getElementById("newBook").value.trim();
if(!name)return;

if(!db.books[name])db.books[name]=[];

save();
renderBooks();
openBook(name);
}

function renderBooks(){
let list=document.getElementById("bookList");
list.innerHTML="";

Object.keys(db.books).forEach(name=>{
list.innerHTML+=`
<button onclick="openBook('${name}')">📖 ${name}</button>
`;
});
}

function openBook(name){
current=name;
document.getElementById("title").innerText="📖 "+name;
renderChat();
}

/* FORMAT */
function format(cmd){
document.execCommand(cmd,false,null);
}

function setFont(font){
document.execCommand("fontName",false,font);
}

function setSize(size){
document.execCommand("fontSize",false,"7");
document.querySelectorAll("font[size='7']").forEach(el=>{
el.removeAttribute("size");
el.style.fontSize=size;
});
}

/* REMARKS */
function addRemarkTemp(){
let text=document.getElementById("newRemark").value.trim();
if(!text)return;

tempRemarks.push(text);
renderTempRemarks();
document.getElementById("newRemark").value="";
}

function renderTempRemarks(){
let div=document.getElementById("remarkPreview");
div.innerHTML=tempRemarks.map((r,i)=>`
<div>${r} <button onclick="removeTemp(${i})">✕</button></div>
`).join("");
}

function removeTemp(i){
tempRemarks.splice(i,1);
renderTempRemarks();
}

/* CHAT */
function renderChat(){
let chat=document.getElementById("chat");
chat.innerHTML="";
if(!current)return;

db.books[current].forEach((m,i)=>{

let remarksHtml = (m.remarks||[]).map((r,ri)=>
`<div class="remark-item">
<span>${r}</span>
<button onclick="editRemark(${i},${ri})">✏️</button>
</div>`
).join("");

chat.innerHTML+=`
<div class="msg">
<div>${m.text}</div>

<div class="note-remarks">${remarksHtml}</div>

<div>
<button class="edit" onclick="editNote(${i})">✏️</button>
<button class="del" onclick="deleteNote(${i})">✕</button>
</div>
</div>
`;
});
}

/* ADD NOTE */
function addNote(){
let html=document.getElementById("textEditor").innerHTML.trim();
if(!html && !tempRemarks.length) return;

let note={
text:html,
remarks:[...tempRemarks]
};

if(editIndex!==null){
db.books[current][editIndex]=note;
editIndex=null;
}else{
db.books[current].push(note);
}

tempRemarks=[];
document.getElementById("textEditor").innerHTML="";
renderTempRemarks();
save();
renderChat();
}

/* EDIT NOTE */
function editNote(i){
let note=db.books[current][i];
document.getElementById("textEditor").innerHTML=note.text;
tempRemarks=note.remarks||[];
renderTempRemarks();
editIndex=i;
}

/* DELETE */
function deleteNote(i){
db.books[current].splice(i,1);
save();
renderChat();
}

/* EDIT SINGLE REMARK */
function editRemark(noteIndex, remarkIndex){
let newText=prompt("Редагувати примітку:",db.books[current][noteIndex].remarks[remarkIndex]);
if(newText!==null){
db.books[current][noteIndex].remarks[remarkIndex]=newText;
save();
renderChat();
}
}

renderBooks();

</script>
</body>
</html>
