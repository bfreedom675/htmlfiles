<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Book Flow</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#f7f0ff,#ffe6f2);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:850px;
    background:#fff;
    padding:25px;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#6a3df0;
}

.add-box{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
}

.add-box input{
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

.add-box button{
    background:#6a3df0;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.card{
    border:1px solid #eee;
    border-radius:15px;
    padding:15px;
    margin:15px 0;
    background:#fafaff;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.title{
    font-weight:bold;
    color:#333;
}

.type{
    font-size:12px;
    padding:4px 8px;
    border-radius:8px;
    background:#eee;
    color:#555;
}

a{
    color:#6a3df0;
    text-decoration:none;
    font-size:13px;
}

.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#6a3df0;
    color:white;
    font-size:12px;
}

.delete-btn{
    background:transparent;
    color:#bdbdbd;
    font-size:16px;
    padding:4px 6px;
    opacity:0.5;
}

.delete-btn:hover{
    opacity:1;
    color:#8c8c8c;
}

.note-box{
    margin-top:10px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    border:1px solid #eee;
}

.note{
    display:flex;
    justify-content:space-between;
    background:#f3f3ff;
    padding:6px;
    margin-top:5px;
    border-radius:8px;
    font-size:13px;
}

.preview-img{
    margin-top:10px;
    max-width:160px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 Book Flow</h1>

<div class="add-box">
    <input id="title" placeholder="Назва (ідея, фільм, курс...)">
    <input id="url" placeholder="URL (посилання)">
    <input id="type" placeholder="Тип (Ідея / Фільм / Курс...)">
    
    <button onclick="addItem()">➕ Додати ресурс</button>
</div>

<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBKZn1jyazC-2trsWvz03tNZvNTQ0FPW2g",
  authDomain: "interesting-598dd.firebaseapp.com",
  projectId: "interesting-598dd",
  storageBucket: "interesting-598dd.firebasestorage.app",
  messagingSenderId: "1009723993759",
  appId: "1:1009723993759:web:945a0404ef2eb91b6bbcaa",
  measurementId: "G-KBF0ZFJBWN"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection("interests");

// 🔥 FAVICON FUNCTION
function getFavicon(url){
    try{
        const domain = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
    }catch{
        return "";
    }
}

// ➕ ADD ITEM
function addItem(){
    const title = document.getElementById("title").value.trim();
    const url = document.getElementById("url").value.trim();
    const type = document.getElementById("type").value.trim();

    if(!title) return alert("Введи назву!");

    col.add({
        title,
        url,
        type,
        notes: [],
        image: null,
        created: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("url").value = "";
    document.getElementById("type").value = "";
}

// 🗑 DELETE
function deleteItem(id){
    if(confirm("Видалити цей ресурс?")){
        col.doc(id).delete();
    }
}

// 📝 NOTES
function addNote(id){
    const text = prompt("Введи нотатку:");
    if(!text) return;

    col.doc(id).get().then(doc=>{
        const data = doc.data();
        data.notes.push({text});
        col.doc(id).update({notes:data.notes});
    });
}

function deleteNote(id,i){
    col.doc(id).get().then(doc=>{
        const data = doc.data();
        data.notes.splice(i,1);
        col.doc(id).update({notes:data.notes});
    });
}

// 🖼 IMAGE
function uploadImage(event,id){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = e=>{
        col.doc(id).update({image:e.target.result});
    };
    reader.readAsDataURL(file);
}

// 🔁 LIVE
col.orderBy("created","desc").onSnapshot(snapshot=>{
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc=>{
        const d = doc.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="top">
                <div>
                    <div class="title">${d.title}</div>

                    ${d.url ? `
                        <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
                            <img src="${getFavicon(d.url)}" style="width:18px;height:18px;border-radius:5px;">
                            <a href="${d.url}" target="_blank">${d.url}</a>
                        </div>
                    ` : ""}

                </div>
                <div class="type">${d.type}</div>
            </div>

            <div class="actions">
                <button onclick="addNote('${doc.id}')">➕ Нотатка</button>
                <input type="file" onchange="uploadImage(event,'${doc.id}')">
                <button class="delete-btn" onclick="deleteItem('${doc.id}')">❌</button>
            </div>

            ${d.image ? `<img class="preview-img" src="${d.image}">` : ""}

            <div class="note-box">
                ${(d.notes||[]).map((n,i)=>`
                    <div class="note">
                        <span>${n.text}</span>
                        <button onclick="deleteNote('${doc.id}',${i})">❌</button>
                    </div>
                `).join("")}
            </div>
        `;

        list.appendChild(div);
    });
});

</script>

</body>
</html>
